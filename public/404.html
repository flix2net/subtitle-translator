<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Subtitle Translator</title>
  <script>
    // SPA routing for GitHub Pages with basePath
    const path = location.pathname.replace('/subtitle-translator', '');
    const segments = path.split('/').filter(Boolean);
    const locales = ['en','zh','zh-hant','pt','es','hi','ar','fr','de','ja','ko','ru','vi','th','tr','bn','id','it'];
    // Find the locale segment
    let localeIdx = -1;
    for (let i = 0; i < segments.length; i++) {
      if (locales.includes(segments[i])) { localeIdx = i; break; }
    }
    if (localeIdx >= 0) {
      location.replace('/subtitle-translator/' + segments.slice(localeIdx).join('/') + '/');
    } else {
      location.replace('/subtitle-translator/en/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
